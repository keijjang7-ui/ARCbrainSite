<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARC brain Text Editor</title>
  <style>
    :root {
      --bg: #f5f6f9;
      --panel: #ffffff;
      --ink: #17181c;
      --muted: #707580;
      --line: #e2e5eb;
      --line-strong: #c9ced8;
      --action: #1457ff;
      --action-soft: #edf3ff;
      --danger: #b42318;
      --ok: #137333;
      --shadow: 0 18px 52px rgba(20, 27, 44, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      height: 100svh;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
    }

    button:hover {
      border-color: var(--action);
      color: var(--action);
    }

    button.primary {
      border-color: var(--action);
      background: var(--action);
      color: #fff;
    }

    button.danger {
      border-color: #f0c7c3;
      color: var(--danger);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.62;
    }

    .app {
      height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .topbar {
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
    }

    .topbar h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .shell {
      min-height: 0;
      display: grid;
      grid-template-columns: 250px 540px minmax(360px, 1fr);
      gap: 18px;
      padding: 18px;
      overflow: hidden;
    }

    .sidebar,
    .editor,
    .preview {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .sidebar {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .search {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .search input {
      width: 100%;
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
    }

    .section-list {
      overflow: auto;
      padding: 8px;
    }

    .section-tab {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 4px;
      padding: 8px 10px;
      border: 0;
      background: transparent;
      text-align: left;
    }

    .section-tab.is-active {
      background: #f5f5fb;
      color: var(--action);
    }

    .section-tab.is-active .count {
      background: #fff;
      color: var(--muted);
    }

    .count {
      min-width: 26px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #eef0f4;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    .editor {
      overflow: auto;
      padding: 18px;
    }

    .group {
      margin-bottom: 22px;
    }

    .group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .group h2 {
      margin: 0;
      font-size: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcfe;
    }

    .field + .field {
      margin-top: 10px;
    }

    .field-label {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge {
      padding: 2px 7px;
      border-radius: 999px;
      background: #edf0f5;
      color: var(--muted);
      font-size: 11px;
      text-transform: none;
    }

    .badge.attribute {
      background: #fff4de;
      color: #7a4b00;
    }

    .badge.shared {
      background: #eef3ff;
      color: var(--action);
    }

    textarea {
      width: 100%;
      min-height: 76px;
      resize: vertical;
      padding: 11px 12px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
    }

    textarea:focus,
    input:focus {
      border-color: var(--action);
      outline: 3px solid rgba(20, 87, 255, 0.12);
    }

    .field-footer {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .preview {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .preview-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .preview iframe {
      min-height: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 12px;
      white-space: pre-wrap;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
    }

    .empty {
      padding: 28px;
      border: 1px dashed var(--line-strong);
      border-radius: 10px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 1180px) {
      .shell {
        grid-template-columns: 250px minmax(0, 1fr);
      }

      .preview {
        display: none;
      }
    }

    @media (max-width: 760px) {
      body {
        height: auto;
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100svh;
        overflow: visible;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .shell {
        grid-template-columns: 1fr;
        overflow: visible;
      }

      .sidebar {
        height: auto;
      }

      .section-list {
        max-height: 240px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>ARC brain Text Editor</h1>
        <div class="meta" id="fileMeta">Loading index.html...</div>
      </div>
      <div class="actions">
        <button type="button" id="reloadButton">Sync From Index</button>
        <button type="button" id="previewButton">Refresh Preview</button>
        <button type="button" class="primary" id="saveButton">Save To Index</button>
      </div>
    </header>

    <main class="shell">
      <aside class="sidebar">
        <div class="search">
          <input id="searchInput" type="search" placeholder="Search text">
        </div>
        <nav class="section-list" id="sectionList" aria-label="Sections"></nav>
      </aside>

      <section class="editor" id="editor" aria-label="Editable text"></section>

      <aside class="preview">
        <div class="preview-head">
          <strong>Preview</strong>
          <span class="status" id="saveStatus"></span>
        </div>
        <iframe id="previewFrame" src="/index.html" title="Homepage preview"></iframe>
      </aside>
    </main>
  </div>

  <script>
    const state = {
      activeGroup: "all",
      entries: [],
      version: "",
      values: new Map(),
      query: ""
    };

    const displayLabels = {
      header: "Header",
      hero: "Hero",
      problem: "Problem",
      solution: "Platform",
      features: "Features",
      usecases: "Solutions",
      trust: "Trust",
      cta: "Contact",
      footer: "Footer"
    };

    const menuGroupOrder = [
      "document",
      "header",
      "hero",
      "problem",
      "solution",
      "features",
      "usecases",
      "trust",
      "cta",
      "footer"
    ];

    const editor = document.querySelector("#editor");
    const sectionList = document.querySelector("#sectionList");
    const searchInput = document.querySelector("#searchInput");
    const saveButton = document.querySelector("#saveButton");
    const reloadButton = document.querySelector("#reloadButton");
    const previewButton = document.querySelector("#previewButton");
    const saveStatus = document.querySelector("#saveStatus");
    const fileMeta = document.querySelector("#fileMeta");
    const previewFrame = document.querySelector("#previewFrame");

    const setStatus = (element, message, tone = "") => {
      element.textContent = message;
      element.className = `status ${tone}`.trim();
    };

    const escapeHtml = (value) =>
      String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

    const getPreviewScroll = () => {
      try {
        const previewWindow = previewFrame.contentWindow;
        const previewDocument = previewWindow.document;
        const root = previewDocument.documentElement;
        const body = previewDocument.body;
        const scrollHeight = Math.max(root.scrollHeight, body?.scrollHeight || 0);
        const maxY = Math.max(0, scrollHeight - previewWindow.innerHeight);

        return {
          x: previewWindow.scrollX || root.scrollLeft || body?.scrollLeft || 0,
          y: previewWindow.scrollY || root.scrollTop || body?.scrollTop || 0,
          ratio: maxY > 0 ? (previewWindow.scrollY || root.scrollTop || body?.scrollTop || 0) / maxY : 0
        };
      } catch {
        return null;
      }
    };

    const restorePreviewScroll = (scroll) => {
      if (!scroll) return;

      const applyScroll = () => {
        try {
          const previewWindow = previewFrame.contentWindow;
          const previewDocument = previewWindow.document;
          const root = previewDocument.documentElement;
          const body = previewDocument.body;
          const scrollHeight = Math.max(root.scrollHeight, body?.scrollHeight || 0);
          const maxY = Math.max(0, scrollHeight - previewWindow.innerHeight);
          const targetY = Math.min(scroll.y, maxY);

          previewWindow.scrollTo(scroll.x, targetY);
        } catch {
          // The preview is same-origin in normal use. Ignore restoration if it is unavailable.
        }
      };

      requestAnimationFrame(applyScroll);
      setTimeout(applyScroll, 80);
      setTimeout(applyScroll, 240);
    };

    const refreshPreview = (options = {}) => {
      const scroll = options.scroll || (options.preserveScroll ? getPreviewScroll() : null);

      if (scroll) {
        previewFrame.addEventListener("load", () => restorePreviewScroll(scroll), { once: true });
      }

      previewFrame.src = `/index.html?preview=${Date.now()}`;
    };

    const entryGroups = (entry) =>
      Array.isArray(entry.groups) && entry.groups.length ? entry.groups : [entry.group];

    const entryGroupLabel = (entry, groupKey) =>
      displayLabels[groupKey] || entry.groupLabelsByKey?.[groupKey] || entry.groupLabel || groupKey;

    const entryBelongsToGroup = (entry, groupKey) =>
      groupKey === "all" || entryGroups(entry).includes(groupKey);

    const renderGroupKey = (entry) =>
      state.activeGroup === "all" ? entry.group : state.activeGroup;

    const sortMenuGroups = (items) => {
      const originalIndex = new Map(items.map((group, index) => [group.key, index]));
      const orderIndex = new Map(menuGroupOrder.map((key, index) => [key, index]));

      return items.slice().sort((a, b) => {
        const aOrder = orderIndex.has(a.key) ? orderIndex.get(a.key) : Number.MAX_SAFE_INTEGER;
        const bOrder = orderIndex.has(b.key) ? orderIndex.get(b.key) : Number.MAX_SAFE_INTEGER;

        if (aOrder !== bOrder) return aOrder - bOrder;
        return originalIndex.get(a.key) - originalIndex.get(b.key);
      });
    };

    const groups = () => {
      const map = new Map();
      state.entries.forEach((entry) => {
        entryGroups(entry).forEach((groupKey) => {
          if (!map.has(groupKey)) {
            map.set(groupKey, {
              key: groupKey,
              label: entryGroupLabel(entry, groupKey),
              count: 0
            });
          }
          map.get(groupKey).count += 1;
        });
      });
      return [{ key: "all", label: "All Text", count: state.entries.length }].concat(
        sortMenuGroups(Array.from(map.values()))
      );
    };

    const currentValue = (entry) =>
      state.values.has(entry.id) ? state.values.get(entry.id) : entry.value;

    const matchesFilters = (entry) => {
      const inGroup = entryBelongsToGroup(entry, state.activeGroup);
      if (!inGroup) return false;
      if (!state.query) return true;

      const value = [
        entry.groupLabel,
        entry.groupLabels?.join(" "),
        entry.label,
        entry.labels?.join(" "),
        entry.value,
        currentValue(entry)
      ].join(" ");
      return value.toLowerCase().includes(state.query);
    };

    const renderSections = () => {
      sectionList.innerHTML = "";
      groups().forEach((group) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `section-tab ${group.key === state.activeGroup ? "is-active" : ""}`.trim();
        button.innerHTML = `<span>${escapeHtml(group.label)}</span><span class="count">${group.count}</span>`;
        button.addEventListener("click", () => {
          state.activeGroup = group.key;
          render();
        });
        sectionList.appendChild(button);
      });
    };

    const autosize = (textarea) => {
      textarea.style.height = "auto";
      textarea.style.height = `${Math.max(76, textarea.scrollHeight + 2)}px`;
    };

    const renderEditor = () => {
      const visible = state.entries.filter(matchesFilters);
      editor.innerHTML = "";

      if (!visible.length) {
        editor.innerHTML = '<div class="empty">No matching text.</div>';
        return;
      }

      const byGroup = new Map();
      visible.forEach((entry) => {
        const groupKey = renderGroupKey(entry);
        if (!byGroup.has(groupKey)) {
          byGroup.set(groupKey, {
            label: entryGroupLabel(entry, groupKey),
            entries: []
          });
        }
        byGroup.get(groupKey).entries.push(entry);
      });

      byGroup.forEach((group) => {
        const groupElement = document.createElement("section");
        groupElement.className = "group";
        groupElement.innerHTML = `
          <div class="group-header">
            <h2>${escapeHtml(group.label)}</h2>
            <span class="count">${group.entries.length}</span>
          </div>
        `;

        group.entries.forEach((entry) => {
          const field = document.createElement("div");
          field.className = "field";
          const badgeClass = entry.kind === "attribute" ? "badge attribute" : "badge";
          const sharedBadge =
            entry.occurrenceCount > 1
              ? `<span class="badge shared">${entry.occurrenceCount} places</span>`
              : "";
          const groupSummary =
            entry.groupLabels && entry.groupLabels.length > 1
              ? `${entry.groupLabels.length} sections`
              : entry.id;
          field.innerHTML = `
            <div class="field-label">
              <span>${escapeHtml(entry.label)}</span>
              <span class="${badgeClass}">${escapeHtml(entry.kind)}</span>
              ${sharedBadge}
            </div>
            <textarea data-id="${entry.id}" spellcheck="true">${escapeHtml(currentValue(entry))}</textarea>
            <div class="field-footer">
              <span>${escapeHtml(groupSummary)}</span>
              <span data-count="${entry.id}">${currentValue(entry).length} chars</span>
            </div>
          `;

          const textarea = field.querySelector("textarea");
          const counter = field.querySelector("[data-count]");
          textarea.addEventListener("input", () => {
            state.values.set(entry.id, textarea.value);
            counter.textContent = `${textarea.value.length} chars`;
            autosize(textarea);
          });
          groupElement.appendChild(field);
        });

        editor.appendChild(groupElement);
      });

      editor.querySelectorAll("textarea").forEach(autosize);
    };

    const render = () => {
      renderSections();
      renderEditor();
    };

    const loadEntries = async (options = {}) => {
      if (!options.quiet) {
        setStatus(saveStatus, "Loading...");
      }
      const response = await fetch("/api/texts");
      if (!response.ok) throw new Error("Could not load text entries.");
      const data = await response.json();
      state.entries = data.entries;
      state.version = data.version;
      state.values = new Map(data.entries.map((entry) => [entry.id, entry.value]));
      const rawCount = data.rawEntryCount || data.entries.length;
      fileMeta.textContent = `${data.entries.length} editable fields from ${rawCount} text items in ${data.indexPath}`;
      if (!options.quiet) {
        setStatus(saveStatus, `Loaded ${data.entries.length} fields`, "ok");
      }
      render();
    };

    const saveEntries = async () => {
      saveButton.disabled = true;
      setStatus(saveStatus, "Saving...");
      const previewScroll = getPreviewScroll();

      const entries = state.entries.map((entry) => ({
        id: entry.id,
        memberIds: entry.memberIds,
        value: currentValue(entry)
      }));

      const response = await fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ entries, version: state.version })
      });
      const data = await response.json();

      if (!response.ok) {
        if (response.status === 409 && data.stale) {
          throw new Error("index.html changed after this editor loaded. Click Sync From Index, then save again.");
        }
        throw new Error(data.error || "Save failed.");
      }

      setStatus(
        saveStatus,
        data.changed ? `Saved ${data.updateCount} items` : "No changes",
        "ok"
      );
      refreshPreview({ scroll: previewScroll });
      await loadEntries({ quiet: true });
      saveButton.disabled = false;
    };

    searchInput.addEventListener("input", () => {
      state.query = searchInput.value.trim().toLowerCase();
      renderEditor();
    });

    reloadButton.addEventListener("click", () => {
      loadEntries().catch((error) => setStatus(saveStatus, error.message, "error"));
    });

    previewButton.addEventListener("click", () => refreshPreview({ preserveScroll: true }));

    saveButton.addEventListener("click", () => {
      saveEntries().catch((error) => {
        saveButton.disabled = false;
        setStatus(saveStatus, error.message, "error");
      });
    });

    loadEntries().catch((error) => setStatus(saveStatus, error.message, "error"));
  </script>
</body>
</html>
